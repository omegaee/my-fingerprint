name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx update-browserslist-db@latest
      - name: Build output.js
        run: npm run build:all || true
      - name: Build all
        run: npm run build:all

      - name: Package artifacts
        run: |
          cd dist && zip -r ../my-fingerprint-chrome-${{ github.ref_name }}.zip . && cd ..
          cd dist-firefox && zip -r ../my-fingerprint-firefox-${{ github.ref_name }}.xpi . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            my-fingerprint-chrome-${{ github.ref_name }}.zip
            my-fingerprint-firefox-${{ github.ref_name }}.xpi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}